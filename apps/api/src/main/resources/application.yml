spring:
  application:
    name: localbiz-radar-api
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/localbiz}"
    username: "${SPRING_DATASOURCE_USERNAME:localbiz}"
    password: "${SPRING_DATASOURCE_PASSWORD:localbiz}"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: "${SPRING_DATA_REDIS_HOST:localhost}"
      port: "${SPRING_DATA_REDIS_PORT:6379}"

localbiz:
  cors:
    allowed-origins: "${LOCALBIZ_CORS_ALLOWED_ORIGINS:http://localhost:3000}"
  security:
    admin:
      username: admin
      password: admin1234
      display-name: LocalBiz Admin
    jwt:
      issuer: localbiz-radar
      access-token-secret: local-development-access-token-secret-change-me-change-me
      refresh-token-secret: local-development-refresh-token-secret-change-me-change-me
      access-token-valid-minutes: 15
      refresh-token-valid-days: 7
    cookie:
      access-token-name: LOCALBIZ_ACCESS_TOKEN
      refresh-token-name: LOCALBIZ_REFRESH_TOKEN
      http-only: true
      secure: false
      same-site: Lax
      path: /
      access-token-max-age-seconds: 900
      refresh-token-max-age-seconds: 604800
  store-sync:
    max-rows-per-import: "${LOCALBIZ_STORE_SYNC_MAX_ROWS_PER_IMPORT:5000}"
    max-file-size-bytes: "${LOCALBIZ_STORE_SYNC_MAX_FILE_SIZE_BYTES:20971520}"
    fail-fast: "${LOCALBIZ_STORE_SYNC_FAIL_FAST:false}"
    default-source-system: "${LOCALBIZ_STORE_SYNC_DEFAULT_SOURCE_SYSTEM:SMALL_BUSINESS_CSV}"
    max-error-summary-count: "${LOCALBIZ_STORE_SYNC_MAX_ERROR_SUMMARY_COUNT:20}"
  store-openapi:
    base-url: "${STORE_OPENAPI_BASE_URL:https://apis.data.go.kr/B553077/api/open/sdsc2}"
    service-key: "KJwtczqNlM0bDybWKLhjyguVK7fFybyXqoG6FeTKoOh/kegfjSyckG3sPxMPXFXdzEluPatAv756yhcy3rMDGA=="
    default-type: "xml"
    enabled: "${STORE_OPENAPI_ENABLED:false}"
    scheduler-enabled: "${STORE_OPENAPI_SCHEDULER_ENABLED:false}"
    cron: "${STORE_OPENAPI_CRON:0 0 3 * * *}"
    default-page-size: "${STORE_OPENAPI_DEFAULT_PAGE_SIZE:100}"
    max-pages-per-run: "${STORE_OPENAPI_MAX_PAGES_PER_RUN:1}"
    request-timeout-seconds: "${STORE_OPENAPI_REQUEST_TIMEOUT_SECONDS:10}"
    request-interval-millis: "${STORE_OPENAPI_REQUEST_INTERVAL_MILLIS:1000}"
    default-div-id: "${STORE_OPENAPI_DEFAULT_DIV_ID:signguCd}"
    default-region-key: "${STORE_OPENAPI_DEFAULT_REGION_KEY:11680}"
    default-sido-name: "${STORE_OPENAPI_DEFAULT_SIDO_NAME:서울특별시}"
    default-sigungu-name: "${STORE_OPENAPI_DEFAULT_SIGUNGU_NAME:강남구}"
    default-source-system: "${STORE_OPENAPI_DEFAULT_SOURCE_SYSTEM:SMALL_BUSINESS_OPENAPI}"
