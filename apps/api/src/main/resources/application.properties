spring.application.name=localbiz-radar-api
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/localbiz}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:localbiz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:localbiz}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
localbiz.cors.allowed-origins=${LOCALBIZ_CORS_ALLOWED_ORIGINS:http://localhost:3000}
localbiz.store-sync.max-rows-per-import=${LOCALBIZ_STORE_SYNC_MAX_ROWS_PER_IMPORT:5000}
localbiz.store-sync.max-file-size-bytes=${LOCALBIZ_STORE_SYNC_MAX_FILE_SIZE_BYTES:20971520}
localbiz.store-sync.fail-fast=${LOCALBIZ_STORE_SYNC_FAIL_FAST:false}
localbiz.store-sync.default-source-system=${LOCALBIZ_STORE_SYNC_DEFAULT_SOURCE_SYSTEM:SMALL_BUSINESS_CSV}
localbiz.store-sync.max-error-summary-count=${LOCALBIZ_STORE_SYNC_MAX_ERROR_SUMMARY_COUNT:20}
