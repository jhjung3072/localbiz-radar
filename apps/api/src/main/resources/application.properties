spring.application.name=localbiz-radar-api
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/localbiz}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:localbiz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:localbiz}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
localbiz.cors.allowed-origins=${LOCALBIZ_CORS_ALLOWED_ORIGINS:http://localhost:3000}
