name: Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.observability.yml config
          docker compose -f docker-compose.prod.yml config
          docker compose -f docker-compose.prod.yml -f docker-compose.prod.direct.yml config

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t localbiz-radar-api:ci apps/api

      - name: Build Web image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t localbiz-radar-web:ci \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://localhost \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT=ci \
            .
