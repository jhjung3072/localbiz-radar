services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: localbiz-radar-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - localbiz_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:3.3.2
    container_name: localbiz-radar-loki
    command: "-config.file=/etc/loki/loki-config.yml"
    ports:
      - "3100:3100"
    volumes:
      - ./infra/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - localbiz_loki_data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    container_name: localbiz-radar-promtail
    command: "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./infra/monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    container_name: localbiz-radar-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - localbiz_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

volumes:
  localbiz_prometheus_data:
  localbiz_loki_data:
  localbiz_grafana_data:
